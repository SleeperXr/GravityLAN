# GravityLAN Unraid Development Compose
# Forces local build and host networking for physical interface access.

services:
  gravitylan:
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    image: sleeperxr/gravitylan:latest
    container_name: GravityLAN
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./data:/app/data
    environment:
      - TZ=Europe/Berlin
      - GRAVITYLAN_DEBUG=false
      - GRAVITYLAN_PORT=8000
