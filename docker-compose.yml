services:
  gravitylan:
    image: sleeperxr/gravitylan:latest
    container_name: GravityLAN
    restart: unless-stopped
    # ports:
    #   - "8000:8000"
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./data:/app/data
    environment:
      - TZ=UTC
      - GRAVITYLAN_DEBUG=false
      - GRAVITYLAN_PORT=8000 # Since we are in host mode, we use this port directly
