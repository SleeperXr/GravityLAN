services:
  gravitylan:
    container_name: gravitylan
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    cap_add:
      - NET_RAW
      - NET_ADMIN
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--workers", "1"]
    environment:
      - GRAVITYLAN_DATA_DIR=/app/data
      - GRAVITYLAN_DEBUG=true
      - GRAVITYLAN_PORT=8080
