services:
  gravitylan:
    build: .
    container_name: GravityLAN
    privileged: true
    restart: unless-stopped

    # Hier passiert die Magie: Wir nutzen Port-Mapping UND Macvlan
    ports:
      - "8000:8000"

    networks:
      home_lan:
        ipv4_address: 192.168.100.254
      default:
        # Erforderlich für die Kommunikation mit dem Host (Ports)

    volumes:
      - /mnt/user/appdata/gravitylan/backend:/app
      - /mnt/user/appdata/gravitylan/static:/app/static
      - /mnt/user/appdata/gravitylan/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - GRAVITYLAN_PORT=8000
      - GRAVITYLAN_DATA_DIR=/app/data
      - TZ=Europe/Berlin
      - GRAVITYLAN_DEBUG=true

    cap_add:
      - NET_RAW
      - NET_ADMIN

networks:
  home_lan:
    external: true
    name: br0
