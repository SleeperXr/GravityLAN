version: '3.8'

services:
  gravitylan:
    build: .
    container_name: GravityLAN
    network_mode: host
    privileged: true
    restart: unless-stopped
    
    # Host mode for direct network access and host communication
        
    volumes:
      - /mnt/user/appdata/gravitylan/data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      
    environment:
      - GRAVITYLAN_PORT=8000
      - GRAVITYLAN_DATA_DIR=/app/data
      - DOCKER_HOST_IP=192.168.100.26
      - TZ=Europe/Berlin
      
    cap_add:
      - NET_RAW
      - NET_ADMIN

networks:
  # Das Macvlan wird entfernt, da es die Host-Kommunikation blockiert
  default:
    driver: bridge
