# Advanced Deployment: Host Networking
# Simplest LAN access for scans, but removes container isolation.
services:
  gravitylan:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: GravityLAN_Host
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./data:/app/data
    environment:
      - GRAVITYLAN_PORT=8000
      - TZ=UTC
