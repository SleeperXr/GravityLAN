# GravityLAN Docker Compose — Macvlan Network
#
# SETUP:
# 1. Adjust 'parent' to your host's network interface (e.g. eth0, ens18, br0)
# 2. Adjust 'subnet', 'gateway' to match your LAN
# 3. Set 'ipv4_address' to the desired static IP for GravityLAN
# 4. Run: docker compose up -d
#
# UNRAID USERS:
# - Use the Unraid Docker UI with "Custom: br0" network type
# - Set a static IP in your LAN range

services:
  gravitylan:
    image: oliver/gravitylan:v0.1.0  # Ersetze 'oliver' durch deinen DockerHub Namen
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: gravitylan
    restart: unless-stopped

    # Required for network scanning
    cap_add:
      - NET_RAW
      - NET_ADMIN

    volumes:
      - gravitylan-data:/data

    environment:
      - GRAVITYLAN_DATA_DIR=/data
      - GRAVITYLAN_DEBUG=false

    networks:
      gravitylan-net:
        ipv4_address: 192.168.1.200  # <-- CHANGE THIS to your desired IP

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:80/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  gravitylan-data:
    driver: local

networks:
  gravitylan-net:
    driver: macvlan
    driver_opts:
      parent: eth0  # <-- CHANGE THIS to your host's interface (eth0, ens18, br0, etc.)
    ipam:
      config:
        - subnet: 192.168.1.0/24         # <-- CHANGE THIS to your LAN subnet
          gateway: 192.168.1.1            # <-- CHANGE THIS to your router IP
          ip_range: 192.168.1.200/32      # Only allow the single IP
